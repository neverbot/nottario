services:
  nottario:
    build:
      context: .
    image: nottario:dev
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8080}"
      DATABASE_URL: "postgres://nottario:nottario@db:5432/nottario?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nottario
      POSTGRES_PASSWORD: nottario
      POSTGRES_DB: nottario
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nottario -d nottario"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  db-data:
