version: "2"
sql:
  - engine: postgresql
    schema: "internal/db/migrations"
    queries: "internal/db/queries"
    gen:
      go:
        package: "dbq"
        out: "internal/db/dbq"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
