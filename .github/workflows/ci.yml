name: ci

# Single CI pipeline. The `test` job is the universal gate: every PR
# and every push runs `make check` (gofmt + vet + lint + sqlc-check +
# docs-check + the full test suite against a fresh Postgres) plus a
# smoke build of the docs site. The `publish-image` and `publish-docs`
# jobs only run after `test` succeeds, and only on pushes to master
# or git tags `v*` — PRs never publish.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Pages publishing needs these workflow-level permissions; they are
# scoped down to the publish-docs job that actually uses them.
permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nottario
          POSTGRES_PASSWORD: nottario
          POSTGRES_DB: nottario
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://nottario:nottario@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      # Node is needed by `make js-check`, which runs `node --check`
      # over every frontend .js file as a syntax gate. No deps are
      # installed; we just need the binary on PATH.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install dev tools (golangci-lint, sqlc)
        run: make tools

      - name: gate
        # `make check` runs gofmt, go vet, golangci-lint (with our
        # custom sqlcheck analyzer), sqlc diff, docs-check, and
        # `go test ./...`. The integration tests gate on
        # TEST_DATABASE_URL above, so they fire here instead of being
        # skipped.
        run: make check

      - name: Docs build (smoke)
        # `make check` already validates the docs corpus via
        # `make docs-check` (front matter, partials, internal links).
        # This step additionally renders the full site so any
        # template / asset-write failures surface here, not in the
        # publish-docs job that ships to Pages.
        run: make docs-build

  publish-image:
    name: Build and publish container image
    needs: test
    # Publish only on real pushes (master or tags). PRs go through
    # `test` for the gate and stop there.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Needed so `git describe --tags` resolves to a meaningful
          # version inside the build context.
          fetch-depth: 0

      - name: Resolve build version
        id: version
        run: |
          VERSION="$(git describe --tags --always --dirty)"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # master push → :latest. git tags vX.Y.Z → :X.Y.Z and :X.Y.
          # Untagged digests of previous master pushes remain in GHCR
          # so a regression can be rolled back to any past digest.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=nottario
            org.opencontainers.image.description=Self-hosted task + docs + architecture coordinator for humans and AI agents
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
            DATE=${{ steps.version.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  publish-docs:
    name: Build and deploy docs site
    needs: test
    # Publish only on master pushes. PRs validate via the `test` job
    # and stop there. Git tags do not redeploy the docs — the site
    # tracks master so changes show up as soon as they merge.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Pages publishing is single-flight: only one deployment proceeds
    # at a time, with newer pushes cancelling pending older ones.
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build docs with subdirectory base URL
        # The site is served at https://neverbot.github.io/nottario/ so
        # every site-internal absolute path has to be prefixed with
        # /nottario. The generator threads --base-url through templates
        # and the markdown rewriter, so a single flag is all it needs.
        run: go run ./cmd/nottario-docs --in docs/site/content --out docs/site/dist --base-url /nottario

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
